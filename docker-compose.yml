version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora_dev_password
      POSTGRES_DB: nexora
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
